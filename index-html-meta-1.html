<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ========================================== -->
    <!-- Facebook & LINE & Slack 社群分享 (Open Graph) -->
    <!-- ========================================== -->
    
    <!-- 1. 網站標題：社群卡片上的大標題（通常比網頁 title 稍微精簡） -->
    <meta property="og:title" content="iVAS Studio 官方網站">

    <!-- 2. 網站描述：吸引人點擊的摘要（建議在 60-90 字內，太長會被標點符號...省略） -->
    <meta property="og:description" content="探索創新的軟體開發與自動化部署解決方案。我們提供最專業的系統架構分析，協助企業輕鬆完成數位轉型。">

    <!-- 3. 預覽圖片：最關鍵的視覺！必須是絕對路徑（完整的網址 http...） -->
    <meta property="og:image" content="https://example.com/assets/preview-image.jpg">
    
    <!-- 4. 預覽圖片安全網址：確保在 HTTPS 網站下能正確載入 -->
    <meta property="og:image:secure_url" content="https://example.com/assets/preview-image.jpg">

    <!-- 5. 網站標準網址：防止社群平台因為網址後面的追蹤碼（如 ?utm_source=fb）而重複計算讚數 -->
    <meta property="og:url" content="https://example.com/">

    <!-- 6. 網站類型：一般網站通常用 website，如果是部落格文章可以用 article -->
    <meta property="og:type" content="website">

    <!-- 7. 網站名稱：整個網站的品牌名稱（通常會顯示在標題下方或最底部） -->
    <meta property="og:site_name" content="iVAS Studio">

    <!-- 8. 語系設定：告訴社群平台這是台灣繁體中文 -->
    <meta property="og:locale" content="zh_TW">

    <!-- ========================================== -->
    <!-- X (原 Twitter) 專用卡片標籤（選填） -->
    <!-- ========================================== -->
    <!-- 許多平台（如 Slack）也會參考 Twitter 標籤，建議一併加上 -->
    <meta name="twitter:card" content="summary_large_image"> <!-- 使用大圖卡片樣式 -->
    <meta name="twitter:title" content="iVAS Studio 官方網站">
    <meta name="twitter:description" content="探索創新的軟體開發與自動化部署解決方案。">
    <meta name="twitter:image" content="https://example.com/assets/preview-image.jpg">
    <title>iVAS Studio 官方網站 | 企業數位轉型與軟體開發專家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>網頁內容</h1>
    <script type="module">
    </script>
</body>
</html>
