

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- <meta> 標籤（稱為元數據標籤，Metadata）
    是用來提供「關於此網頁的資訊」給瀏覽器、搜尋引擎（SEO）或其他網路服務看。
    它不會直接顯示在網頁的畫面上，
    但對網頁的字體編碼、RWD 響應式排版、搜尋排名和瀏覽器行為至關重要 
    -->
    <meta charset="UTF-8">
    <!-- 
    做什麼用 ： 設定網頁的字元編碼（Character Encoding）。
    為什麼重要： 網際網路上有各種語言和符號，UTF-8 是目前全球最通用的萬國碼，
               支援幾乎所有的語系（包括繁體中文、日文、英文、甚至 Emoji 表情符號）。
    如果沒寫會怎樣： 如果瀏覽器猜錯編碼，網頁上的中文就會變成一堆看不懂的亂碼（例如：æé）。 
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- * **參數拆解：**
    * `name="viewport"`：告訴瀏覽器接下來要設定的是螢幕視窗畫面。
    * `width=device-width`：將網頁寬度設定為「等於目前裝置的螢幕寬度」
      （例如 iPhone 螢幕多寬，網頁基底就多寬）。
    * `initial-scale=1.0`：設定畫面初始縮放比例為 **100%**（不放大也不縮小）。 
    -->
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>網頁內容</h1>
  <script type="module">
  </script>
</body>
</html>
